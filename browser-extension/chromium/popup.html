<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>llmTools</title>
  <style>
    body {
      margin: 0;
      min-width: 270px;
      font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #202124;
      background: #ffffff;
    }
    .wrap {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mark {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #1a73e8;
      color: white;
      display: grid;
      place-items: center;
      font-weight: 700;
    }
    .title {
      font-weight: 650;
    }
    .status {
      color: #5f6368;
      min-height: 18px;
      line-height: 1.35;
    }
    .progress {
      height: 6px;
      border-radius: 999px;
      background: #e8eaed;
      overflow: hidden;
    }
    .bar {
      width: 0%;
      height: 100%;
      background: #188038;
      transition: width 160ms ease;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button.wide {
      grid-column: 1 / -1;
    }
    button {
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: #fff;
      color: #202124;
      padding: 7px 9px;
      font: inherit;
      cursor: pointer;
    }
    button.primary {
      background: #1a73e8;
      border-color: #1a73e8;
      color: white;
    }
    button:disabled {
      opacity: 0.45;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="mark">译</div>
      <div>
        <div class="title">llmTools</div>
        <div id="model" class="status">正在检查本地应用...</div>
      </div>
    </div>
    <div id="status" class="status">就绪</div>
    <div class="progress"><div id="bar" class="bar"></div></div>
    <div class="actions">
      <button id="translate" class="primary">翻译页面</button>
      <button id="restore">恢复原文</button>
      <button id="cancel">取消</button>
      <button id="statusBtn">测试</button>
      <button id="clearCache" class="wide" title="清除当前页面的缓存译文">清除缓存</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
