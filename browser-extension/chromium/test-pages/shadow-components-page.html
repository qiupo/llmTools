<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>llmTools Shadow Components Fixture</title>
  <style>
    body {
      max-width: 820px;
      margin: 40px auto;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #202124;
    }
    llm-tools-shadow-card,
    llm-tools-closed-shadow-card,
    llm-tools-silent-closed-card {
      display: block;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Web component translation route</h1>
    <p>Ordinary document text should translate alongside supported component text.</p>
    <llm-tools-shadow-card></llm-tools-shadow-card>
    <llm-tools-closed-shadow-card aria-label="Closed shadow component content"></llm-tools-closed-shadow-card>
    <llm-tools-silent-closed-card role="button" tabindex="0"></llm-tools-silent-closed-card>
  </main>
  <script>
    customElements.define("llm-tools-shadow-card", class extends HTMLElement {
      connectedCallback() {
        if (this.shadowRoot) {
          return;
        }
        const root = this.attachShadow({ mode: "open" });
        root.innerHTML = `
          <style>
            article {
              border: 1px solid #d7dce2;
              border-radius: 8px;
              padding: 16px;
              background: #f8fafc;
            }
            button {
              border: 1px solid #1a73e8;
              border-radius: 6px;
              padding: 7px 10px;
              background: #1a73e8;
              color: #fff;
              font: inherit;
            }
          </style>
          <article>
            <h2 data-shadow-heading>Open shadow component heading</h2>
            <p data-shadow-body>Shadow component body text should be translated safely.</p>
            <button data-shadow-action>Confirm component action</button>
            <div data-shadow-dynamic></div>
          </article>
        `;
      }
    });

    customElements.define("llm-tools-closed-shadow-card", class extends HTMLElement {
      connectedCallback() {
        if (this.dataset.ready === "true") {
          return;
        }
        this.dataset.ready = "true";
        const root = this.attachShadow({ mode: "closed" });
        root.innerHTML = `
          <style>
            article {
              border: 1px dashed #b78d12;
              border-radius: 8px;
              padding: 14px;
              background: #fff8e1;
            }
          </style>
          <article>
            <h2>Closed shadow component heading</h2>
            <p>Closed shadow component text cannot be inspected directly.</p>
          </article>
        `;
      }
    });

    customElements.define("llm-tools-silent-closed-card", class extends HTMLElement {
      connectedCallback() {
        if (this.dataset.ready === "true") {
          return;
        }
        this.dataset.ready = "true";
        const root = this.attachShadow({ mode: "closed" });
        root.innerHTML = `
          <style>
            button {
              border: 1px solid #6f42c1;
              border-radius: 8px;
              padding: 10px 12px;
              background: #f3efff;
              color: #32175f;
              font: inherit;
            }
          </style>
          <button>Closed shadow signal action</button>
        `;
      }
    });

    window.addShadowParagraph = () => {
      const container = document.querySelector("llm-tools-shadow-card").shadowRoot.querySelector("[data-shadow-dynamic]");
      const paragraph = document.createElement("p");
      paragraph.dataset.shadowAdded = "true";
      paragraph.textContent = "Dynamically added shadow text should be discovered.";
      container.appendChild(paragraph);
    };
  </script>
</body>
</html>
