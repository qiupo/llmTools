<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>llmTools Form Editor Fixture</title>
  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    label {
      display: grid;
      gap: 6px;
      margin: 14px 0;
    }
    input,
    textarea,
    [contenteditable] {
      border: 1px solid #cfd6dd;
      border-radius: 6px;
      padding: 8px;
      font: inherit;
    }
    [contenteditable] {
      min-height: 72px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Campaign editor workflow</h1>
    <p>Visible helper text should translate while user-authored fields stay untouched.</p>
    <label>
      Campaign title
      <input data-title-input value="Do not translate typed campaign title">
    </label>
    <label>
      Internal notes
      <textarea data-notes-textarea>Do not translate draft customer notes.</textarea>
    </label>
    <section aria-label="Rich editor">
      <h2>Message body</h2>
      <div data-rich-editor contenteditable="true">Do not translate editable rich text content.</div>
    </section>
    <p>Preview cards and validation messages remain safe for page translation.</p>
  </main>
</body>
</html>
